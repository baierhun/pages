<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>{{ page.title }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; line-height: 1.6; padding: 20px; }
    
    table { border-collapse: collapse; width: 100%; margin-bottom: 16px; }
    th, td { border: 1px solid #dfe2e5; padding: 6px 13px; }
    tr:nth-child(even) { background-color: #f6f8fa; }
    th { font-weight: 600; background-color: #f6f8fa; text-align: left; }

    blockquote {
      padding: 0 1em;
      color: #6a737d;
      border-left: 0.25em solid #dfe2e5;
      margin: 1.5em 0;
    }
  </style>
</head>
<body style="font-family: Arial, sans-serif; max-width: 900px; margin: auto;">
  {{ content }}
</body>
</html>
