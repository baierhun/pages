<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>{{ page.title }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; line-height: 1.6; padding: 20px; }
    
    table { border-collapse: collapse; width: 100%; margin-bottom: 16px; }
    th, td { border: 1px solid #dfe2e5; padding: 6px 13px; }
    tr:nth-child(even) { background-color: #f6f8fa; }
    th { font-weight: 600; background-color: #f6f8fa; text-align: left; }

    blockquote {
      padding: 0 1em;
      color: #6a737d;
      border-left: 0.25em solid #dfe2e5;
      margin: 1.5em 0;
    }

    /* Inline Code (Single Ticks) */
    code {
      padding: 0.2em 0.4em;
      margin: 0;
      font-size: 85%;
      background-color: rgba(27, 31, 35, 0.05);
      border-radius: 6px;
      font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, Consolas, Liberation Mono, monospace;
    }

    /* Code Blocks (Triple Ticks) */
    pre {
      padding: 16px;
      overflow: auto;
      font-size: 85%;
      line-height: 1.45;
      background-color: #f6f8fa;
      border-radius: 6px;
      margin-top: 0;
      margin-bottom: 16px;
    }

    /* Ensure code inside pre blocks doesn't get the inline background */
    pre code {
      background-color: transparent;
      padding: 0;
      margin: 0;
      font-size: inherit;
      border-radius: 0;
    }
  </style>
</head>
<body style="font-family: Arial, sans-serif; max-width: 900px; margin: auto;">
  {{ content }}
</body>
</html>
